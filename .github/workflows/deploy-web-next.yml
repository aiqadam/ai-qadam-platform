name: deploy-web-next

# Auto-deploy the two non-Coolify compose stacks on every push to main:
#   - next.aiqadam.org   (apps/web-next/)
#   - design.aiqadam.org (apps/storybook/)
#
# Why this is separate from deploy.yml: deploy.yml drives Coolify-managed
# apps via the Coolify REST API. These two stacks are intentionally NOT
# Coolify-managed (see infrastructure/web-next/docker-compose.yml header
# for the rationale — Coolify's auto-gen Traefik labels are destructive
# to forwardauth-gated sub-apps). So we rsync the repo into prod over
# SSH and run docker compose directly.
#
# This workflow mirrors the manual deploy dance PR-0c and PR-0d had to
# do — only now it runs unattended on every merge to main. See
# infrastructure/web-next/deploy.sh for what runs on the host.
#
# Secrets required:
#   - WEB_NEXT_DEPLOY_KEY         — ed25519 private key, authorized as
#                                   aiqadam-admin@aiqadam-prod
#   - WEB_NEXT_DEPLOY_KNOWN_HOSTS — pinned host keys for 212.20.151.29

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Serialize deploys across both stacks per ref. We don't want two
  # rsyncs racing on the same /opt/aiqadam/<stack>/source/ directory
  # if commits land back-to-back, and we don't want to cancel a deploy
  # in flight.
  group: deploy-web-next-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        stack: [web-next, storybook]

    steps:
      - uses: actions/checkout@v4

      - name: Load deploy SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.WEB_NEXT_DEPLOY_KEY }}

      - name: Pin prod host keys
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.WEB_NEXT_DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Rsync repo to prod ${{ matrix.stack }} source
        run: |
          set -euo pipefail
          # Stream the working tree into /opt/aiqadam/<stack>/source/.
          # --delete keeps the prod source identical to this commit (no
          # leftovers from previous deploys). We exclude .git and other
          # build-time noise to keep the transfer small — Docker only
          # needs the buildable source tree.
          rsync -az --delete \
            --rsync-path="sudo rsync" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='dist' \
            --exclude='.turbo' \
            ./ \
            aiqadam-admin@212.20.151.29:/opt/aiqadam/${{ matrix.stack }}/source/

      - name: Run deploy script on prod
        run: |
          set -euo pipefail
          # The script lives in the repo at infrastructure/web-next/deploy.sh
          # (shared by both stacks) and is now sitting on prod under
          # /opt/aiqadam/<stack>/source/infrastructure/web-next/deploy.sh
          # because of the rsync above. We execute it with bash so we
          # don't depend on the executable bit surviving the rsync.
          ssh aiqadam-admin@212.20.151.29 \
            "bash /opt/aiqadam/${{ matrix.stack }}/source/infrastructure/web-next/deploy.sh ${{ matrix.stack }}"
