name: smoke

# Sprint 0.10 — browser-agent smoke tests (Lane 2 of 3-lane execution model).
# See docs/community-platform-roadmap.md §2.5 + §7.5.
#
# Runs Playwright tests against production (read-only assertions only).
# A separate workflow (Sprint 0.11 — smoke-production-probe.yml) runs every
# 30 min for continuous production health monitoring.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  schedule:
    # Every 30 minutes — production probe. Replaces the previous
    # push-to-main trigger which raced the Coolify auto-deploy that the
    # SAME push initiated (web container redeploys lag api by ~30–90s and
    # serve "no available server" plaintext during that window). The
    # health-gate workaround consistently saw `api=200 web=no` from
    # GitHub-Actions IPs for the full 7.5-min budget, so push-trigger
    # smoke could never be reliably green.
    #
    # Smoke now runs:
    #   - on PR: validates the PR's behavior against current prod (no
    #     deploy race because the PR isn't deploying)
    #   - on schedule (every 30 min): genuine prod-probe duty
    #
    # Push-to-main no longer triggers smoke; the supply-chain + ci gates
    # already guard merges, and the next scheduled run catches any
    # post-deploy regression.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # The scheduled alerting steps below open + comment + close issues
  # to alert on prod-probe failures (F-S0.11). PR runs don't need
  # issues:write but having it set per-workflow keeps the job
  # rerunnable across event types without surprises.
  issues: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/e2e
        run: pnpm exec playwright install --with-deps chromium

      - name: Wait for prod to be healthy
        # Coolify auto-deploy on push to main redeploys BOTH web + api as
        # separate containers; each redeploy takes ~60–90s during which the
        # Coolify load balancer returns "no available server" plaintext for
        # that specific container. Without this gate, smoke races the deploy
        # and fails with 0 favicons / 502 / missing nav.
        #
        # We check BOTH containers are up — /api/health (api) AND the
        # homepage HTML contains <link rel="icon"> (web served real HTML, not
        # the LB fallback). Both must be true for 2 consecutive polls (10s
        # stable) before we run tests, so we don't race a deploy that just
        # came online.
        env:
          BASE: ${{ vars.SMOKE_BASE_URL || 'https://aiqadam.org' }}
        run: |
          stable_polls=0
          for i in $(seq 1 90); do
            api_code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/health" || echo "000")
            web_body=$(curl -sL "$BASE" || true)
            web_ok="no"
            if echo "$web_body" | grep -q 'rel="icon"'; then
              web_ok="yes"
            fi
            if [ "$api_code" = "200" ] && [ "$web_ok" = "yes" ]; then
              stable_polls=$((stable_polls + 1))
              echo "  ${i}/90: api=$api_code web=$web_ok (stable: $stable_polls/2)"
              if [ "$stable_polls" -ge 2 ]; then
                echo "✅ prod healthy (api+web both responding) after ${i} attempt(s)"
                exit 0
              fi
            else
              if [ "$stable_polls" -gt 0 ]; then
                echo "  ${i}/90: api=$api_code web=$web_ok (resetting stability)"
              else
                echo "  ${i}/90: api=$api_code web=$web_ok (waiting 5s…)"
              fi
              stable_polls=0
            fi
            sleep 5
          done
          echo "❌ prod did not become stable within 7.5 min"
          exit 1

      - name: Run smoke tests
        working-directory: apps/e2e
        env:
          BASE_URL: ${{ vars.SMOKE_BASE_URL || 'https://aiqadam.org' }}
          CI: "true"
        run: pnpm test:e2e

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_id }}
          path: apps/e2e/playwright-report/
          retention-days: 7

      - name: Upload Playwright traces (failures only)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces-${{ github.run_id }}
          path: apps/e2e/test-results/
          retention-days: 7

      # ─────────── F-S0.11 — Prod-probe alerting ────────────────────────
      #
      # On the scheduled cron path only (NOT on PRs — humans see PR
      # failures inline), alert on smoke failure by:
      #   1. Emitting a Plausible ops-event (prod_probe_failure) so the
      #      failure rate is trackable over time in /workspace/analytics.
      #   2. Opening (or commenting on) an issue labelled
      #      `prod-probe-failure` so an engineer is paged in their normal
      #      issue feed. Dedupe via the open-issue check — we don't open
      #      a fresh issue for every 30-min tick during a multi-hour
      #      outage.
      #
      # When smoke recovers on a subsequent cron run, the recovery step
      # below closes the open issue with a "resolved by run #N" comment.
      #
      # Telegram alerting is deliberately omitted from this PR: the
      # Telegram alert bot's chat id + token are not yet in this repo's
      # GH secrets. When they are (HUMAN one-off), add a second step
      # gated on `if: secrets.TELEGRAM_ALERT_BOT_TOKEN != ''`.

      - name: Alert on scheduled smoke failure (F-S0.11)
        if: ${{ failure() && github.event_name == 'schedule' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PLAUSIBLE_HOST: ${{ vars.PLAUSIBLE_OPS_HOST || 'https://analytics.aiqadam.org' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e
          # 1. Plausible ops-event.
          curl -sS -X POST "${PLAUSIBLE_HOST}/api/event" \
            -H "Content-Type: application/json" \
            -H "User-Agent: aiqadam-ci-smoke-probe" \
            -d "{
              \"name\": \"prod_probe_failure\",
              \"url\": \"github://prod-probe/${{ github.run_id }}\",
              \"domain\": \"aiqadam.org\",
              \"props\": {
                \"run_id\": \"${{ github.run_id }}\",
                \"workflow\": \"smoke\",
                \"event\": \"schedule\"
              }
            }" \
            || echo "(plausible POST failed; non-blocking)"

          # 2. Issue (open or comment).
          existing=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label prod-probe-failure \
            --state open \
            --json number,title \
            --jq '.[0].number // empty')
          body="Scheduled smoke probe failed on run [${{ github.run_id }}](${RUN_URL}).

The workflow ran the prod-health gate + Playwright suite against \`https://aiqadam.org\`. One or both failed.

- **Run:** ${RUN_URL}
- **Commit on main:** ${{ github.sha }}

If this is the second consecutive cron failure, escalate to [\`security.md\`](../../docs/runbooks/security.md) or [\`auth.md\`](../../docs/runbooks/auth.md) depending on the failing scenario."
          if [ -n "${existing}" ]; then
            gh issue comment "${existing}" \
              --repo "${{ github.repository }}" \
              --body "${body}"
            echo "Commented on existing issue #${existing}."
          else
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "prod-probe-failure: smoke failed on run ${{ github.run_id }}" \
              --label prod-probe-failure \
              --body "${body}"
            echo "Opened new prod-probe-failure issue."
          fi

      - name: Resolve open prod-probe issue on recovery (F-S0.11)
        if: ${{ success() && github.event_name == 'schedule' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e
          existing=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label prod-probe-failure \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          if [ -n "${existing}" ]; then
            gh issue comment "${existing}" \
              --repo "${{ github.repository }}" \
              --body "Recovered. Scheduled smoke probe passed on run [${{ github.run_id }}](${RUN_URL}). Closing."
            gh issue close "${existing}" \
              --repo "${{ github.repository }}" \
              --reason completed
            echo "Closed recovered issue #${existing}."
          else
            echo "No open prod-probe-failure issue; nothing to recover."
          fi
