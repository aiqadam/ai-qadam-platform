name: parity-check

on:
  schedule:
    # Run every 24 hours at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      base_url_v1:
        description: 'V1 base URL (default: https://aiqadam.org)'
        required: false
        default: 'https://aiqadam.org'
      base_url_v2:
        description: 'V2 base URL (default: https://next.aiqadam.org)'
        required: false
        default: 'https://next.aiqadam.org'

concurrency:
  group: parity-check
  cancel-in-progress: false

jobs:
  e2e-parity:
    name: E2E parity sweep (v1 + v2)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @aiqadam/e2e install:browsers

      - name: Run parity E2E suite
        env:
          BASE_URL_V1: ${{ github.event.inputs.base_url_v1 || 'https://aiqadam.org' }}
          BASE_URL_V2: ${{ github.event.inputs.base_url_v2 || 'https://next.aiqadam.org' }}
          # Set PARITY_AUTH_COOKIE and PARITY_OPERATOR_COOKIE in repo secrets
          # for authenticated test coverage. Unset = authenticated tests are skipped.
          PARITY_AUTH_COOKIE: ${{ secrets.PARITY_AUTH_COOKIE }}
          PARITY_OPERATOR_COOKIE: ${{ secrets.PARITY_OPERATOR_COOKIE }}
        run: pnpm e2e:parity

      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-report-${{ github.run_number }}
          path: apps/e2e/parity-report/
          retention-days: 14

  lighthouse:
    name: Lighthouse CI — v2 perf budget (>= 90)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Run Lighthouse after E2E so a broken v2 deploy fails E2E first
    needs: e2e-parity
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lighthouse CI
        run: pnpm --filter @aiqadam/e2e lhci:run
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
