name: deploy

# F5 of the Phase 2 plan — continuous deployment.
# On every push to main, redeploy both apps in parallel by calling
# Coolify's REST deploy endpoint. Coolify pulls the new commit, rebuilds
# the Docker image, restarts the container, and updates the Traefik
# config. Each deploy takes ~1–3 minutes per app.
#
# Deploy-key apps in Coolify don't have a native GitHub push webhook,
# so we drive it from here. Auth is the same Bearer token Phase 1 used
# for manual deploys; stored as a repo secret.
#
# To rotate: run `gh secret set COOLIFY_TOKEN` with a new token from
# Coolify's Keys & Tokens UI, then revoke the old one.

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger from the Actions tab

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # never cancel a deploy mid-flight

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # Both prod apps are in the aiqadam project. UUIDs are stable per
        # the Coolify install — captured here so the workflow needs no
        # extra secrets beyond the bearer token. If they ever change,
        # update both halves of this matrix.
        include:
          - app: web
            uuid: esc8aoaddr3b4btx843sslz1
          - app: api
            uuid: h5m7cpzfamualvdblupy3yy3

    steps:
      - name: Trigger Coolify deploy of ${{ matrix.app }}
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          set -euo pipefail
          RESP=$(curl -sS -w '\nHTTP_STATUS:%{http_code}' \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            "https://coolify.aiqadam.org/api/v1/deploy?uuid=${{ matrix.uuid }}&force=false")
          BODY=$(echo "$RESP" | sed '$d')
          STATUS=$(echo "$RESP" | tail -n1 | sed 's/HTTP_STATUS://')
          echo "Coolify response (HTTP $STATUS):"
          echo "$BODY"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Coolify rejected deploy (HTTP $STATUS)"
            exit 1
          fi
          DEPLOY_UUID=$(echo "$BODY" | jq -r '.deployments[0].deployment_uuid // empty')
          if [ -z "$DEPLOY_UUID" ]; then
            echo "::error::No deployment UUID returned"
            exit 1
          fi
          echo "Queued deploy $DEPLOY_UUID for ${{ matrix.app }}."
          echo "Track at: https://coolify.aiqadam.org/project/nyjnuhos2dypvx6krlj218ic/environment/bjbutdwy9nieizgtgc7gsr8w/application/${{ matrix.uuid }}/deployment/$DEPLOY_UUID"
