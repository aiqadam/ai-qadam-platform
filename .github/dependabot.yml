# Dependabot — automated dependency PRs for Sprint 0.3 supply-chain.
# Triages CVEs flagged by .github/workflows/supply-chain.yml.
# Runbook: docs/04-development/security/runbooks/supply-chain.md
#
# Cadence: weekly Mondays so the queue lands alongside the weekly Trivy scan.

version: 2
updates:
  # All workspace packages (apps/api, apps/web, apps/workers, apps/bot if it
  # ever gains an npm manifest, packages/*). Dependabot reads pnpm-lock.yaml
  # at the root and emits one PR per outdated direct dep.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Tashkent
    open-pull-requests-limit: 0  # disabled — set to 10 to re-enable
    versioning-strategy: increase
    labels:
      - dependencies
      - security
    groups:
      # Roll patch + minor bumps into one PR per ecosystem to keep the review
      # queue manageable. Major bumps stay individual (need human judgement).
      minor-and-patch:
        update-types:
          - patch
          - minor
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # Container image tags in every infrastructure docker-compose.yml. Local-only
  # images (pgvector, MinIO) are listed here so the dev environment also drifts
  # forward; the Trivy job in supply-chain.yml only scans prod images.
  - package-ecosystem: docker
    directories:
      - "/infrastructure"
      - "/infrastructure/plausible"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Tashkent
    open-pull-requests-limit: 0  # disabled — set to 10 to re-enable
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(infra)"
      include: scope

  # GitHub Actions used in .github/workflows/*. Catches CVEs in third-party
  # actions (aquasecurity/trivy-action, pnpm/action-setup, etc.).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Tashkent
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
      include: scope
