<!-- @dsCard group="Type" viewport="700x280" subtitle="Geist — display scale (titles, hero, brand)" name="Display scale · Geist" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px 24px;background:var(--background)}</style>
</head>
<body>
<div style="display:flex;flex-direction:column;gap:4px">
  <div style="display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:4px">
    <span style="font-family:var(--font-display);font-size:60px;font-weight:700;line-height:1.05;letter-spacing:-0.025em;color:var(--foreground)">шагаем</span>
    <code style="font-size:10px;font-family:var(--font-mono);color:var(--muted-foreground);flex-shrink:0">60px / 700 / display</code>
  </div>
  <div style="display:flex;align-items:baseline;gap:16px;padding:6px 0">
    <span style="font-family:var(--font-display);font-size:36px;font-weight:700;line-height:1.1;letter-spacing:-0.025em;color:var(--foreground)">The quick brown fox</span>
    <code style="font-size:10px;font-family:var(--font-mono);color:var(--muted-foreground);flex-shrink:0">36px · text-4xl</code>
  </div>
  <div style="display:flex;align-items:baseline;gap:16px;padding:4px 0">
    <span style="font-family:var(--font-display);font-size:30px;font-weight:600;line-height:1.15;letter-spacing:-0.02em;color:var(--foreground)">Съешь же ещё этих мягких</span>
    <code style="font-size:10px;font-family:var(--font-mono);color:var(--muted-foreground);flex-shrink:0">30px · text-3xl</code>
  </div>
  <div style="display:flex;align-items:baseline;gap:16px;padding:4px 0">
    <span style="font-family:var(--font-display);font-size:24px;font-weight:600;line-height:1.2;letter-spacing:-0.015em;color:var(--foreground)">AI Qadam · LLM Engineering in Production</span>
    <code style="font-size:10px;font-family:var(--font-mono);color:var(--muted-foreground);flex-shrink:0">24px · text-2xl</code>
  </div>
  <div style="display:flex;align-items:baseline;gap:16px;padding:4px 0">
    <span style="font-family:var(--font-display);font-size:20px;font-weight:600;line-height:1.25;letter-spacing:-0.01em;color:var(--foreground)">Card title — Computer Vision Day in Almaty</span>
    <code style="font-size:10px;font-family:var(--font-mono);color:var(--muted-foreground);flex-shrink:0">20px · text-xl</code>
  </div>
</div>
</body>
</html>
