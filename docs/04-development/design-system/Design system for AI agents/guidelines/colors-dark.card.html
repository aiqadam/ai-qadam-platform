<!-- @dsCard group="Colors" viewport="700x200" subtitle="Surface & neutral tokens — dark mode" name="Surface tokens · dark" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px 24px;background:var(--background)}</style>
</head>
<body>
<div style="display:flex;flex-wrap:wrap;gap:20px;align-items:flex-start">
  <div style="display:flex;flex-direction:column;gap:5px">
    <div style="width:80px;height:52px;border-radius:8px;background:var(--background);border:1px solid var(--border)"></div>
    <code style="font-size:10px;font-family:var(--font-mono);color:var(--foreground)">--background</code>
    <code style="font-size:9px;font-family:var(--font-mono);color:var(--muted-foreground)">oklch(0.145 0 0)</code>
  </div>
  <div style="display:flex;flex-direction:column;gap:5px">
    <div style="width:80px;height:52px;border-radius:8px;background:var(--foreground)"></div>
    <code style="font-size:10px;font-family:var(--font-mono);color:var(--foreground)">--foreground</code>
    <code style="font-size:9px;font-family:var(--font-mono);color:var(--muted-foreground)">oklch(0.985 0 0)</code>
  </div>
  <div style="display:flex;flex-direction:column;gap:5px">
    <div style="width:80px;height:52px;border-radius:8px;background:var(--card);border:1px solid var(--border)"></div>
    <code style="font-size:10px;font-family:var(--font-mono);color:var(--foreground)">--card</code>
    <code style="font-size:9px;font-family:var(--font-mono);color:var(--muted-foreground)">oklch(0.205 0 0)</code>
  </div>
  <div style="display:flex;flex-direction:column;gap:5px">
    <div style="width:80px;height:52px;border-radius:8px;background:var(--muted);border:1px solid var(--border)"></div>
    <code style="font-size:10px;font-family:var(--font-mono);color:var(--foreground)">--muted</code>
    <code style="font-size:9px;font-family:var(--font-mono);color:var(--muted-foreground)">oklch(0.269 0 0)</code>
  </div>
  <div style="display:flex;flex-direction:column;gap:5px">
    <div style="width:80px;height:52px;border-radius:8px;background:var(--muted-foreground)"></div>
    <code style="font-size:10px;font-family:var(--font-mono);color:var(--foreground)">--muted-fg</code>
    <code style="font-size:9px;font-family:var(--font-mono);color:var(--muted-foreground)">oklch(0.708 0 0)</code>
  </div>
  <div style="display:flex;flex-direction:column;gap:5px">
    <div style="width:80px;height:52px;border-radius:8px;background:var(--border)"></div>
    <code style="font-size:10px;font-family:var(--font-mono);color:var(--foreground)">--border</code>
    <code style="font-size:9px;font-family:var(--font-mono);color:var(--muted-foreground)">oklch(0.269 0 0)</code>
  </div>
  <div style="display:flex;flex-direction:column;gap:5px">
    <div style="width:80px;height:52px;border-radius:8px;background:var(--primary)"></div>
    <code style="font-size:10px;font-family:var(--font-mono);color:var(--foreground)">--primary</code>
    <code style="font-size:9px;font-family:var(--font-mono);color:var(--muted-foreground)">oklch(0.70 0.105 192)</code>
  </div>
</div>
</body>
</html>
