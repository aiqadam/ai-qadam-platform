<!-- @dsCard group="Spacing" viewport="700x220" subtitle="Radius scale + shadow tiers" name="Radius & shadows" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px 24px;background:var(--background);display:flex;flex-direction:column;gap:20px}</style>
</head>
<body>

<!-- Radius row -->
<div style="display:flex;flex-wrap:wrap;gap:20px;align-items:flex-end">
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div style="width:48px;height:48px;background:var(--muted);border:1.5px solid var(--border);border-radius:6px"></div>
    <code style="font-family:var(--font-mono);font-size:9px;color:var(--foreground)">--radius-sm</code>
    <code style="font-family:var(--font-mono);font-size:9px;color:var(--muted-foreground)">6px</code>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div style="width:48px;height:48px;background:var(--muted);border:1.5px solid var(--border);border-radius:8px"></div>
    <code style="font-family:var(--font-mono);font-size:9px;color:var(--foreground)">--radius</code>
    <code style="font-family:var(--font-mono);font-size:9px;color:var(--muted-foreground)">8px · default</code>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div style="width:48px;height:48px;background:var(--muted);border:1.5px solid var(--border);border-radius:10px"></div>
    <code style="font-family:var(--font-mono);font-size:9px;color:var(--foreground)">--radius-md</code>
    <code style="font-family:var(--font-mono);font-size:9px;color:var(--muted-foreground)">10px</code>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div style="width:48px;height:48px;background:var(--muted);border:1.5px solid var(--border);border-radius:12px"></div>
    <code style="font-family:var(--font-mono);font-size:9px;color:var(--foreground)">--radius-lg</code>
    <code style="font-family:var(--font-mono);font-size:9px;color:var(--muted-foreground)">12px · cards</code>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div style="width:48px;height:48px;background:var(--muted);border:1.5px solid var(--border);border-radius:16px"></div>
    <code style="font-family:var(--font-mono);font-size:9px;color:var(--foreground)">--radius-xl</code>
    <code style="font-family:var(--font-mono);font-size:9px;color:var(--muted-foreground)">16px · modals</code>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div style="width:48px;height:48px;background:var(--muted);border:1.5px solid var(--border);border-radius:9999px"></div>
    <code style="font-family:var(--font-mono);font-size:9px;color:var(--foreground)">full</code>
    <code style="font-family:var(--font-mono);font-size:9px;color:var(--muted-foreground)">9999px · avatars</code>
  </div>
</div>

<!-- Shadow row -->
<div style="display:flex;flex-wrap:wrap;gap:20px;align-items:flex-end">
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div style="width:80px;height:40px;background:var(--card);border-radius:8px;box-shadow:var(--shadow-sm)"></div>
    <code style="font-family:var(--font-mono);font-size:9px;color:var(--foreground)">--shadow-sm</code>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div style="width:80px;height:40px;background:var(--card);border-radius:8px;box-shadow:var(--shadow)"></div>
    <code style="font-family:var(--font-mono);font-size:9px;color:var(--foreground)">--shadow</code>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div style="width:80px;height:40px;background:var(--card);border-radius:8px;box-shadow:var(--shadow-md)"></div>
    <code style="font-family:var(--font-mono);font-size:9px;color:var(--foreground)">--shadow-md</code>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div style="width:80px;height:40px;background:var(--card);border-radius:8px;box-shadow:var(--shadow-lg)"></div>
    <code style="font-family:var(--font-mono);font-size:9px;color:var(--foreground)">--shadow-lg</code>
  </div>
</div>

</body>
</html>
