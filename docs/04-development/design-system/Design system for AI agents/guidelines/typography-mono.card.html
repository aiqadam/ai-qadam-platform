<!-- @dsCard group="Type" viewport="700x180" subtitle="JetBrains Mono — times, IDs, tags, status labels" name="Technical type · Mono" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px 24px;background:var(--background)}</style>
</head>
<body>
<div style="display:flex;flex-direction:column;gap:10px">
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-family:var(--font-mono);font-size:14px;color:var(--foreground)">18:30 · Tashkent · IT Park · 142 going · #LLM #RAG</span>
    <code style="font-size:9px;font-family:var(--font-mono);color:var(--muted-foreground)">14px — event meta</code>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <span style="font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;padding:3px 8px;border-radius:6px;background:color-mix(in oklch,var(--primary) 10%,transparent);color:var(--primary)">UPCOMING</span>
    <span style="font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;padding:3px 8px;border-radius:6px;background:color-mix(in oklch,var(--live-indicator) 14%,transparent);color:var(--live-indicator)">LIVE</span>
    <span style="font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;padding:3px 8px;border-radius:6px;background:var(--muted);color:var(--muted-foreground)">PAST</span>
    <span style="font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;padding:3px 8px;border-radius:6px;background:color-mix(in oklch,var(--primary) 10%,transparent);color:var(--primary)">ONLINE</span>
    <span style="font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;padding:3px 8px;border-radius:6px;background:color-mix(in oklch,var(--badge-special) 12%,transparent);color:var(--badge-special)">HACKATHON</span>
    <code style="font-size:9px;font-family:var(--font-mono);color:var(--muted-foreground)">status labels</code>
  </div>
  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
    <span style="font-family:var(--font-mono);font-size:12px;color:var(--muted-foreground);background:var(--muted);border:1px solid var(--border);border-radius:6px;padding:2px 8px">#LLM</span>
    <span style="font-family:var(--font-mono);font-size:12px;color:var(--muted-foreground);background:var(--muted);border:1px solid var(--border);border-radius:6px;padding:2px 8px">#RAG</span>
    <span style="font-family:var(--font-mono);font-size:12px;color:var(--muted-foreground);background:var(--muted);border:1px solid var(--border);border-radius:6px;padding:2px 8px">#MLOps</span>
    <span style="font-family:var(--font-mono);font-size:12px;color:var(--muted-foreground);background:var(--muted);border:1px solid var(--border);border-radius:6px;padding:2px 8px">#Computer-Vision</span>
    <span style="font-family:var(--font-mono);font-size:12px;color:var(--muted-foreground);background:var(--muted);border:1px solid var(--border);border-radius:6px;padding:2px 8px">#Agents</span>
    <code style="font-size:9px;font-family:var(--font-mono);color:var(--muted-foreground)">topic tags</code>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <span style="font-family:var(--font-mono);font-size:12px;color:var(--muted-foreground)">@abdu_mzfr · joined Mar 2025 · 🔥 12 streak · #01</span>
    <code style="font-size:9px;font-family:var(--font-mono);color:var(--muted-foreground)">profile meta</code>
  </div>
</div>
</body>
</html>
