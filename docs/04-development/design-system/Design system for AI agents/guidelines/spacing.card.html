<!-- @dsCard group="Spacing" viewport="700x240" subtitle="4px base unit — 10 canonical steps" name="Spacing scale" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px 24px;background:var(--background)}</style>
</head>
<body>
<div style="display:flex;flex-direction:column;gap:6px">
  <div style="display:flex;align-items:center;gap:12px"><div style="background:var(--primary);height:12px;border-radius:2px;width:4px;flex-shrink:0"></div><code style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);width:56px">space-1</code><code style="font-family:var(--font-mono);font-size:10px;color:var(--foreground)">4px</code></div>
  <div style="display:flex;align-items:center;gap:12px"><div style="background:var(--primary);height:12px;border-radius:2px;width:8px;flex-shrink:0"></div><code style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);width:56px">space-2</code><code style="font-family:var(--font-mono);font-size:10px;color:var(--foreground)">8px</code></div>
  <div style="display:flex;align-items:center;gap:12px"><div style="background:var(--primary);height:12px;border-radius:2px;width:12px;flex-shrink:0"></div><code style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);width:56px">space-3</code><code style="font-family:var(--font-mono);font-size:10px;color:var(--foreground)">12px</code></div>
  <div style="display:flex;align-items:center;gap:12px"><div style="background:var(--primary);height:12px;border-radius:2px;width:16px;flex-shrink:0"></div><code style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);width:56px">space-4</code><code style="font-family:var(--font-mono);font-size:10px;color:var(--foreground)">16px — header pad</code></div>
  <div style="display:flex;align-items:center;gap:12px"><div style="background:var(--primary);height:12px;border-radius:2px;width:24px;flex-shrink:0"></div><code style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);width:56px">space-6</code><code style="font-family:var(--font-mono);font-size:10px;color:var(--foreground)">24px — card padding</code></div>
  <div style="display:flex;align-items:center;gap:12px"><div style="background:var(--primary);height:12px;border-radius:2px;width:32px;flex-shrink:0"></div><code style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);width:56px">space-8</code><code style="font-family:var(--font-mono);font-size:10px;color:var(--foreground)">32px</code></div>
  <div style="display:flex;align-items:center;gap:12px"><div style="background:var(--primary);height:12px;border-radius:2px;width:48px;flex-shrink:0"></div><code style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);width:56px">space-12</code><code style="font-family:var(--font-mono);font-size:10px;color:var(--foreground)">48px — section gap</code></div>
  <div style="display:flex;align-items:center;gap:12px"><div style="background:var(--primary);height:12px;border-radius:2px;width:64px;flex-shrink:0"></div><code style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);width:56px">space-16</code><code style="font-family:var(--font-mono);font-size:10px;color:var(--foreground)">64px</code></div>
  <div style="display:flex;align-items:center;gap:12px"><div style="background:var(--primary);height:12px;border-radius:2px;width:80px;flex-shrink:0"></div><code style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);width:56px">space-20</code><code style="font-family:var(--font-mono);font-size:10px;color:var(--foreground)">80px</code></div>
  <div style="display:flex;align-items:center;gap:12px"><div style="background:var(--primary);height:12px;border-radius:2px;width:96px;flex-shrink:0"></div><code style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);width:56px">space-24</code><code style="font-family:var(--font-mono);font-size:10px;color:var(--foreground)">96px</code></div>
</div>
</body>
</html>
