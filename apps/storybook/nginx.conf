# apps/storybook/nginx.conf — static-server config for the Storybook bundle.
#
# Storybook produces a single-page app shell (index.html) + content-hashed
# assets under /assets/. The only routing we need is "fall back to index.html
# for unknown paths" so Storybook's client-side router handles the URL.
#
# Forward-auth is handled upstream (Traefik → Authentik outpost). nginx
# trusts the X-authentik-* headers if they're present and otherwise serves
# the static files. No /api proxy here — Storybook is data-free.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache content-hashed assets. Storybook hashes everything under
    # /assets/, so safe to immutable-cache.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Storybook iframe (preview) — also served from index.html-relative
    # paths, no special handling needed.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cheap liveness probe — `docker exec storybook curl -fs localhost/healthz`.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
