# nginx config for the static Astro build. Astro writes /<page>.html for
# every route (or /<page>/index.html with `build.format: 'directory'`).
# `try_files $uri $uri.html $uri/index.html =404` covers both layouts and
# also serves /_astro/* assets directly.

server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version in error pages + headers.
    server_tokens off;

    # Long-cache for hashed Astro assets.
    location /_astro/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Common static assets.
    location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|webp|ico|map)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Pages: try the literal URL, then with .html, then directory index.
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Don't pollute access logs with health-check pings.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
