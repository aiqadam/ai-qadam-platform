# Twenty CRM — Coolify Docker Compose service stack.
#
# Adapted from the upstream
#   https://github.com/twentyhq/twenty/blob/main/packages/twenty-docker/docker-compose.yml
# Changes for our deployment:
#   - dedicated Postgres + Redis (clean isolation from the platform DB and
#     the BullMQ Redis used by aiqadam-api)
#   - no host port published — Coolify's Traefik proxies cms-crm.aiqadam.org
#     directly to server:3000 via the Coolify network
#   - APP_SECRET injected via Coolify env (32-byte random)
#   - tag pinned (TAG env in Coolify defaults to the version recorded in
#     the runbook so a `latest` upstream change can't drift behaviour)

name: twenty

services:
  server:
    image: twentycrm/twenty:${TAG:-v0.50.0}
    expose:
      - "3000"
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage
    # /app/docker-data holds an opt-in marker file ('db_status') that the
    # entrypoint touches after a successful first migration so subsequent
    # restarts skip the migration step. We mount it as world-writable
    # tmpfs because (a) a named volume comes up root-owned and the image
    # runs as a non-root user → touch fails → set -e crashloops; (b) we
    # don't actually need the optimisation — migrations are idempotent
    # and re-running them on container restart costs ~10s.
    tmpfs:
      - /app/docker-data:mode=1777
    environment:
      NODE_PORT: 3000
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD}@db:5432/default
      SERVER_URL: ${SERVER_URL}
      REDIS_URL: redis://redis:6379
      STORAGE_TYPE: local
      APP_SECRET: ${APP_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: curl --fail http://localhost:3000/healthz
      interval: 5s
      timeout: 5s
      retries: 20
    restart: always

  worker:
    image: twentycrm/twenty:${TAG:-v0.50.0}
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage
    tmpfs:
      - /app/docker-data:mode=1777
    command: ["yarn", "worker:prod"]
    environment:
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD}@db:5432/default
      SERVER_URL: ${SERVER_URL}
      REDIS_URL: redis://redis:6379
      DISABLE_DB_MIGRATIONS: "true"
      DISABLE_CRON_JOBS_REGISTRATION: "true"
      STORAGE_TYPE: local
      APP_SECRET: ${APP_SECRET}
    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_healthy
    restart: always

  db:
    image: postgres:16
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: default
      POSTGRES_PASSWORD: ${PG_DATABASE_PASSWORD}
      POSTGRES_USER: ${PG_DATABASE_USER:-postgres}
    healthcheck:
      test: pg_isready -U ${PG_DATABASE_USER:-postgres} -h localhost -d postgres
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  redis:
    image: redis:7-alpine
    restart: always
    command: ["--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
  server-local-data:
