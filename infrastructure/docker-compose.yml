# infrastructure/docker-compose.yml
#
# Local development shared services per ARCHITECTURE.md §"Local development".
# Apps (apps/web, apps/api, apps/bot, apps/workers) run on the host for fast
# feedback; this compose brings up the persistent + state-bearing services
# they connect to via 127.0.0.1.
#
# All ports bound to 127.0.0.1 only — local dev must never accidentally expose
# anything to the network. Production runs on Coolify on the platform host;
# this file does not apply there.
#
# Usage from this directory:
#   cp .env.example .env       # one-time
#   docker compose up -d
#   docker compose ps
#   docker compose logs -f postgres
#   docker compose down        # stop, keep data
#   docker compose down -v     # stop + delete all data (destructive!)
#
# Services:
#   postgres            — PostgreSQL 16 + pgvector  : 127.0.0.1:5432
#   redis               — Redis 7                   : 127.0.0.1:6379
#   minio               — S3-compatible storage     : 127.0.0.1:9100 (API), 127.0.0.1:9001 (console)
#   authentik-server    — OIDC identity provider    : 127.0.0.1:9000 (HTTP)
#   authentik-worker    — Authentik background jobs : (no exposed ports)
#   twenty              — Twenty CRM                : 127.0.0.1:3010
#   telegram-bot-api    — Local Telegram Bot API    : 127.0.0.1:8082 (HTTP), 127.0.0.1:8083 (HTTPS test)
#
# Directus and Listmonk follow in dedicated PRs as those features come online.
#
# Note: MinIO API moved from 9000 → 9100 when Authentik landed (Authentik's HTTP
# port is hard-coded to 9000 in many places in its image). See
# docs/04-development/infrastructure/runbooks/authentik-local-bootstrap.md.

name: aiqadam-local

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aiqadam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/01-create-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aiqadam-redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--save"
      - "60"
      - "1"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: quay.io/minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: aiqadam-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:${MINIO_API_HOST_PORT:-9100}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Authentik = our OIDC identity provider (ARCHITECTURE.md §"Authentication").
  # Server + worker share one image; the server handles HTTP, the worker runs
  # background jobs (token cleanup, scheduled tasks, email send). Both connect
  # to the shared Postgres `authentik` DB created by scripts/postgres-init.sql
  # and to the shared Redis. First-login + OIDC app setup procedure lives in
  # docs/04-development/infrastructure/runbooks/authentik-local-bootstrap.md.
  #
  # Pinned to 2024.12.3 (latest stable as of 2026-05-15). Authentik moves fast
  # and minor versions occasionally introduce breaking schema changes — bump
  # this in a dedicated PR after reading the release notes.
  authentik-server:
    image: ghcr.io/goauthentik/server:2024.12.3
    container_name: aiqadam-authentik-server
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?set AUTHENTIK_SECRET_KEY in infrastructure/.env}
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER:-postgres}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-admin@aiqadam.org}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:?set AUTHENTIK_BOOTSTRAP_PASSWORD in infrastructure/.env}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_DISABLE_UPDATE_CHECK: "true"
    ports:
      - "127.0.0.1:${AUTHENTIK_HOST_PORT:-9000}:9000"
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.12.3
    container_name: aiqadam-authentik-worker
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?set AUTHENTIK_SECRET_KEY in infrastructure/.env}
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER:-postgres}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_DISABLE_UPDATE_CHECK: "true"
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Twenty CRM — supporting service per ARCHITECTURE.md §"Supporting services".
  # Connects to the shared postgres `twenty` DB and shared redis.
  # Data access from NestJS is ONLY via Twenty's GraphQL API (never SQL join).
  # First-run setup: visit http://localhost:3010, create workspace, then
  # configure API key in apps/api/.env as TWENTY_API_KEY.
  # Pinned to latest stable. Bump in a dedicated PR after reading release notes.
  twenty:
    image: twentycrm/twenty:latest
    container_name: aiqadam-twenty
    restart: unless-stopped
    environment:
      SERVER_URL: http://localhost:${TWENTY_HOST_PORT:-3010}
      FRONT_BASE_URL: http://localhost:${TWENTY_HOST_PORT:-3010}
      PG_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/twenty
      REDIS_URL: redis://redis:6379
      STORAGE_TYPE: local
      APP_SECRET: ${TWENTY_APP_SECRET:?set TWENTY_APP_SECRET in infrastructure/.env}
      # Disable telemetry in local dev
      TELEMETRY_ENABLED: "false"
      TELEMETRY_ANONYMIZATION_ENABLED: "false"
    ports:
      - "127.0.0.1:${TWENTY_HOST_PORT:-3010}:3000"
    volumes:
      - twenty-data:/app/.local-storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Telegram Bot API local server — runs the official Telegram Bot API locally
  # so the aiogram bot (apps/bot/) can be tested without hitting production
  # Telegram servers. The bot must set TELEGRAM_API_SERVER=http://telegram-bot-api:8080
  # and LOCAL_MODE=true in its env. Webhook deliveries go to the bot via the
  # Docker network — no public URL needed.
  # Credentials: get TELEGRAM_API_ID and TELEGRAM_API_HASH from https://my.telegram.org
  # (these are app-level credentials, NOT the bot token).
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: aiqadam-telegram-bot-api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:?set TELEGRAM_API_ID in infrastructure/.env}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:?set TELEGRAM_API_HASH in infrastructure/.env}
      TELEGRAM_LOCAL: "1"
    ports:
      - "127.0.0.1:${TELEGRAM_BOT_API_HOST_PORT:-8082}:8081"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  redis-data:
  minio-data:
  authentik-media:
  authentik-templates:
  twenty-data:
  telegram-bot-api-data:

networks:
  default:
    name: aiqadam-local
    driver: bridge
