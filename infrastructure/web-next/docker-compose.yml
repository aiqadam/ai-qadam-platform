# apps/web-next/ — ADR-0038 greenfield build (PR-0b).
#
# Non-Coolify docker-compose deployment to next.aiqadam.org. We avoid
# the Coolify-managed path here because Coolify's auto-generated
# Traefik labels are stored in applications.custom_labels and a PATCH
# to add a forwardauth middleware REPLACES the full label set, with
# no merge API. That's how the 2026-05-24 prod outage happened — see
# feedback_coolify_custom_labels_replaces_autogen.md.
#
# Instead we mirror the Backrest pattern (infrastructure/backrest/
# docker-compose.yml): a plain compose stack joined to the `coolify`
# external network so Traefik (still in coolify-proxy) picks up the
# hand-written labels below. The forwardauth middleware points at the
# Authentik Embedded Outpost, which gates access to engineer group
# `aiqadam-super-admin` (provisioned by
# scripts/provision-web-next-authentik.sh).
#
# Bootstrap (first time only, on prod host):
#   sudo mkdir -p /opt/aiqadam/web-next
#   cd /opt/aiqadam/web-next
#   sudo cp <this-file> docker-compose.yml
#   # rsync the repo into source/ (manually first time, then GHA takes over)
#   sudo docker compose up -d --build
#
# Updates on merge to main are automated by
# .github/workflows/deploy-web-next.yml — GHA rsyncs the repo into
# /opt/aiqadam/web-next/source/ and runs
# infrastructure/web-next/deploy.sh web-next. The same workflow also
# deploys the apps/storybook/ stack at design.aiqadam.org.

name: aiqadam-web-next

services:
  web-next:
    build:
      context: ./source
      dockerfile: apps/web-next/Dockerfile
    restart: unless-stopped
    expose:
      - "4322"
    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: "4322"
      # SSR auth bootstrap hits the API over the shared coolify
      # docker network. The aiqadam-api container is reachable via its
      # Coolify-generated network alias.
      INTERNAL_API_URL: "http://aiqadam-api:3000"
    labels:
      # Traefik routing. Hand-written; see header for why.
      - "traefik.enable=true"
      - "coolify.managed=false"
      # HTTPS router on next.aiqadam.org (wildcard cert covers it via
      # DNS-01 on the coolify Traefik instance). Forward-auth gates
      # access — every request goes through the Authentik Embedded
      # Outpost first.
      - "traefik.http.routers.web-next.entryPoints=https"
      - "traefik.http.routers.web-next.rule=Host(`next.aiqadam.org`)"
      - "traefik.http.routers.web-next.tls=true"
      - "traefik.http.routers.web-next.service=web-next"
      - "traefik.http.routers.web-next.middlewares=web-next-auth@docker"
      # HTTP → HTTPS redirect (uses Coolify's existing redirect-to-https
      # middleware, defined by coolify-proxy's own labels).
      - "traefik.http.routers.web-next-http.entryPoints=http"
      - "traefik.http.routers.web-next-http.rule=Host(`next.aiqadam.org`)"
      - "traefik.http.routers.web-next-http.middlewares=redirect-to-https@docker"
      # Service definition.
      - "traefik.http.services.web-next.loadbalancer.server.port=4322"
      # Forward-auth middleware: every request is checked by the
      # Authentik outpost. The outpost either lets the request through
      # (with X-authentik-* headers appended) or 302s to the login
      # page. Only members of `aiqadam-super-admin` pass policy — see
      # scripts/provision-web-next-authentik.sh.
      - "traefik.http.middlewares.web-next-auth.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.web-next-auth.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.web-next-auth.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid,X-authentik-jwt,X-authentik-meta-jwks,X-authentik-meta-outpost,X-authentik-meta-provider,X-authentik-meta-app,X-authentik-meta-version"

networks:
  default:
    name: coolify
    external: true
