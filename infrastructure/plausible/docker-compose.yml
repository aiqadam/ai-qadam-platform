# Plausible Community Edition — Coolify Docker Compose service stack.
#
# Adapted from the upstream
#   https://github.com/plausible/community-edition/blob/master/compose.yml
# Changes for our deployment:
#   - dedicated Postgres (no coupling to platform / directus / twenty DBs)
#   - ClickHouse pinned + tuned for low RAM (logging trimmed via inline
#     `configs` so this compose can be POSTed inline to Coolify without
#     a git checkout)
#   - Resend used as SMTP relay (we already have a verified sender on
#     admin@aiqadam.org; saves running our own SMTP)
#   - DISABLE_REGISTRATION=true so the dashboard only admits invited
#     operators; first owner created via `mix create_admin_user` inside
#     the plausible container (see runbook) after first boot
#   - no host port published — Coolify's Traefik proxies
#     analytics.aiqadam.org to plausible:8000 via the Coolify network
#   - tags pinned (PLAUSIBLE_TAG env in Coolify defaults to the value
#     recorded in the runbook so an upstream change can't drift behaviour)
#
# Per H1: this powers the Phase 1 gate measurement (500 visitors / month).
# Site tag added to apps/web/src/layouts/Layout.astro in M5.0-followup.

name: plausible

services:
  plausible:
    image: ghcr.io/plausible/community-edition:${PLAUSIBLE_TAG:-v3.0.1}
    # Upstream-recommended startup: createdb is no-op if already created,
    # migrate is idempotent, run launches the app.
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    expose:
      - "8000"
    volumes:
      - plausible-data:/var/lib/plausible
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      TMPDIR: /var/lib/plausible/tmp
      BASE_URL: ${BASE_URL}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      TOTP_VAULT_KEY: ${TOTP_VAULT_KEY}
      DATABASE_URL: postgres://postgres:${PLAUSIBLE_PG_PW}@db:5432/plausible
      CLICKHOUSE_DATABASE_URL: http://default:@clickhouse:8123/plausible_events_db
      # Mailer — Resend SMTP relay. Sender must be verified on Resend
      # (admin@aiqadam.org already is per the main app's EMAIL_FROM).
      MAILER_ADAPTER: Bamboo.SMTPAdapter
      MAILER_EMAIL: ${MAILER_EMAIL}
      SMTP_HOST_ADDR: smtp.resend.com
      SMTP_HOST_PORT: "587"
      SMTP_HOST_SSL_ENABLED: "false"
      SMTP_USER_NAME: resend
      SMTP_USER_PWD: ${RESEND_API_KEY}
      # Public registration is gated by Coolify env (DISABLE_REGISTRATION).
      # Bootstrap: leave "false" until the first admin has signed up at
      # https://analytics.aiqadam.org, then PATCH this env to "true" and
      # restart. Defaults to "true" if the env is unset.
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-true}
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: always

  db:
    image: postgres:16-alpine
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: plausible
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PLAUSIBLE_PG_PW}
    healthcheck:
      test: pg_isready -U postgres -h localhost -d plausible
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  # ClickHouse pinned to 24.12-alpine — matches the upstream Plausible v3.0.1
  # compose. Newer versions (e.g. 25.3) ship a different default users.d that
  # caused the container to never reach a listening state in our environment.
  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    configs:
      - source: ch_logging_xml
        target: /etc/clickhouse-server/config.d/logging.xml
      - source: ch_ipv4_xml
        target: /etc/clickhouse-server/config.d/ipv4-only.xml
      - source: ch_user_logging_xml
        target: /etc/clickhouse-server/users.d/logging.xml
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: always

# Inline ClickHouse tuning — kills the verbose query-/trace-/metric-log
# tables that pad ~50MB/day on idle, and forces IPv4 bind. Defaults are
# overkill for a single-host install. Inlined via compose `configs` so no
# host filesystem bind mount is needed (the compose file is POSTed to
# Coolify inline).
configs:
  ch_logging_xml:
    content: |
      <clickhouse>
        <logger>
          <level>warning</level>
          <console>true</console>
        </logger>
        <query_thread_log remove="remove"/>
        <query_log remove="remove"/>
        <text_log remove="remove"/>
        <trace_log remove="remove"/>
        <metric_log remove="remove"/>
        <asynchronous_metric_log remove="remove"/>
        <session_log remove="remove"/>
        <part_log remove="remove"/>
      </clickhouse>
  # Docker's default bridge network has IPv6 disabled; the upstream
  # ClickHouse listen_host=[::] fails with "Address family for hostname
  # not supported". Bind both v4 and v6 explicitly.
  ch_ipv4_xml:
    content: |
      <clickhouse>
        <listen_host>0.0.0.0</listen_host>
        <listen_host>::</listen_host>
        <listen_try>1</listen_try>
      </clickhouse>
  ch_user_logging_xml:
    content: |
      <clickhouse>
        <profiles>
          <default>
            <log_queries>0</log_queries>
            <log_query_threads>0</log_query_threads>
          </default>
        </profiles>
      </clickhouse>

volumes:
  db-data:
  clickhouse-data:
  clickhouse-logs:
  plausible-data:
