# deploy/docker-compose.qa.yml — pro-data-tech-qa (95.46.211.230, qa.aiqadam.org).
#
# Source of truth for the QA compose stack. Previously this file existed
# only on the host (/opt/apps/aiqadam-qa/deploy/docker-compose.qa.yml,
# hand-authored during ai-qadam-infra tasks T-0110/T-0112, backed up at
# docker-compose.qa.yml.pre-repo-tracked.bak when this repo took over);
# this repo now owns it so app-repo changes (adding a service, changing
# routing) don't require a separate infra-side session to hand-edit the
# host copy. oidc-stub/api's shape below (mounts, healthchecks,
# depends_on) is copied verbatim from that working original — only
# web-next is new.
#
# deploy.sh (see docs/04-development/infrastructure/runbooks/pro-data-tech-cicd.md)
# runs `docker compose -p aiqadam-qa -f deploy/docker-compose.qa.yml up -d
# --build` from $APP_DIR ($APP_DIR = /opt/apps/aiqadam-qa) after every
# deploy. Compose resolves relative paths (build context, bind mounts)
# against the DIRECTORY CONTAINING THIS FILE (deploy/), not the shell's
# cwd — confirmed via `docker inspect ...working_dir` on the live
# container. So `context: ..` = $APP_DIR (repo root, what the Dockerfiles
# need), and `./oidc-stub/...` = deploy/oidc-stub/... on disk.
#
# Services, all on host networking (matches existing infra convention):
#   - redis: apps/api degrades gracefully without it (JtiRevocationService,
#     OutboxRelayService, internal-cron, Telegram module all log warnings
#     and skip) but authentik-server/authentik-worker below REQUIRE it —
#     this is why redis is being added now, not purely for apps/api's sake.
#   - oidc-stub: static OIDC discovery stub — DEPRECATED, being replaced by
#     authentik-server below. Left in place (not deleted) until apps/api's
#     .env is confirmed cut over to the real OIDC_ISSUER_URL; see
#     ISS-<n> (OIDC login redirects to unreachable stub) for the migration.
#   - authentik-server / authentik-worker: real OIDC/SSO provider, same
#     images/config shape as infrastructure/docker-compose.yml's local-dev
#     stack. Uses the EXISTING ai-qadam-test-db-1 postgres container (a new
#     `authentik` database, not a new postgres instance) and the redis
#     service above.
#   - directus: real CMS, same image/config shape as
#     infrastructure/docker-compose.yml. Uses the existing postgres
#     container (`directus` database). Schema populated once via
#     infrastructure/directus/bootstrap.sh + flows-bootstrap.sh — NOT
#     re-run automatically by this compose file; see the runbook.
#   - api: apps/api, built from apps/api/Dockerfile. Was previously the
#     ONLY app service here (deliberate scope decision during initial
#     infra setup) — nginx proxied '/' straight to it, which is why bare
#     GET / 404'd. web-next below fixes that.
#   - web-next: apps/web-next (the target frontend per ADR-0038), built
#     from apps/web-next/Dockerfile. Talks to the API over the public
#     origin (https://qa.aiqadam.org/v1/...), same pattern as the
#     existing infrastructure/web-next/docker-compose.yml stack, since
#     host networking here has no private Docker DNS between services.
#
# nginx (deploy/nginx/qa.aiqadam.org.conf) routes '/' to web-next:4322
# and '/health' + '/v1/*' to api:3113 — see that file for the split.

name: aiqadam-qa

services:
  redis:
    image: redis:7-alpine
    container_name: aiqadam-qa-redis-1
    restart: unless-stopped
    network_mode: host
    command: ["redis-server", "--port", "3116", "--bind", "127.0.0.1"]
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "3116", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  oidc-stub:
    image: nginx:alpine
    container_name: aiqadam-qa-oidc-stub-1
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./oidc-stub/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./oidc-stub/openid-configuration.json:/etc/oidc-stub/openid-configuration.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9999/.well-known/openid-configuration"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  authentik-server:
    image: ghcr.io/goauthentik/server:2024.12.3
    container_name: aiqadam-qa-authentik-server-1
    restart: unless-stopped
    command: server
    network_mode: host
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?set AUTHENTIK_SECRET_KEY in deploy/.env}
      AUTHENTIK_REDIS__HOST: 127.0.0.1
      AUTHENTIK_REDIS__PORT: "3116"
      AUTHENTIK_POSTGRESQL__HOST: 127.0.0.1
      AUTHENTIK_POSTGRESQL__PORT: "3112"
      AUTHENTIK_POSTGRESQL__USER: aiqadam
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AIQADAM_QA_POSTGRES_PASSWORD:?set AIQADAM_QA_POSTGRES_PASSWORD in deploy/.env}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-admin@aiqadam.org}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:?set AUTHENTIK_BOOTSTRAP_PASSWORD in deploy/.env}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_DISABLE_UPDATE_CHECK: "true"
      # Host networking: bind the internal port to a QA-specific port so it
      # doesn't collide with anything else on this host (dev's default 9000
      # is unused here). nginx (deploy/nginx/qa.aiqadam.org.conf) proxies
      # auth.qa.aiqadam.org -> this port, on its own dedicated subdomain
      # (not a path prefix — see that file's header comment for why).
      AUTHENTIK_LISTEN__HTTP: "127.0.0.1:3117"
      AUTHENTIK_LISTEN__HTTPS: "127.0.0.1:3118"
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.12.3
    container_name: aiqadam-qa-authentik-worker-1
    restart: unless-stopped
    command: worker
    network_mode: host
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?set AUTHENTIK_SECRET_KEY in deploy/.env}
      AUTHENTIK_REDIS__HOST: 127.0.0.1
      AUTHENTIK_REDIS__PORT: "3116"
      AUTHENTIK_POSTGRESQL__HOST: 127.0.0.1
      AUTHENTIK_POSTGRESQL__PORT: "3112"
      AUTHENTIK_POSTGRESQL__USER: aiqadam
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AIQADAM_QA_POSTGRES_PASSWORD:?set AIQADAM_QA_POSTGRES_PASSWORD in deploy/.env}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_DISABLE_UPDATE_CHECK: "true"
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
    depends_on:
      redis:
        condition: service_healthy

  directus:
    image: directus/directus:11
    container_name: aiqadam-qa-directus-1
    restart: unless-stopped
    network_mode: host
    environment:
      SECRET: ${DIRECTUS_SECRET:?set DIRECTUS_SECRET in deploy/.env}
      DB_CLIENT: pg
      DB_HOST: 127.0.0.1
      DB_PORT: "3112"
      DB_DATABASE: directus
      DB_USER: aiqadam
      DB_PASSWORD: ${AIQADAM_QA_POSTGRES_PASSWORD:?set AIQADAM_QA_POSTGRES_PASSWORD in deploy/.env}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:?set DIRECTUS_ADMIN_EMAIL in deploy/.env}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:?set DIRECTUS_ADMIN_PASSWORD in deploy/.env}
      ADMIN_TOKEN: ${DIRECTUS_ADMIN_TOKEN:?set DIRECTUS_ADMIN_TOKEN in deploy/.env}
      TELEMETRY: "false"
      EXTENSIONS_AUTO_RELOAD: "true"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "https://qa.aiqadam.org"
      PORT: "3119"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3119/server/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    image: aiqadam-qa-api:latest
    container_name: aiqadam-qa-api-1
    restart: unless-stopped
    network_mode: host
    depends_on:
      oidc-stub:
        condition: service_healthy
      redis:
        condition: service_healthy
      directus:
        condition: service_healthy
      authentik-server:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: "3113"
      # These 4 override whatever placeholder values are in .env's static
      # section — real services now exist at these addresses. .env keeps
      # the OTHER required vars (JWT_SIGNING_SECRET, INTERNAL_API_TOKEN,
      # WEB_BASE_URL, OIDC_CLIENT_ID/SECRET, DATABASE_URL) as before.
      REDIS_URL: "redis://127.0.0.1:3116"
      DIRECTUS_URL: "http://127.0.0.1:3119"
      # MUST be a real public hostname, not a loopback address: Authentik's
      # discovery document reports authorization_endpoint based on the
      # Host header of the request that fetched /.well-known/... — if this
      # were 127.0.0.1, the SAME bug as the old oidc-stub reproduces with a
      # real server (browser redirected to an address only the host can
      # reach). Uses its OWN subdomain (auth.qa.aiqadam.org), not a path
      # prefix under qa.aiqadam.org — Authentik's self-reported endpoint
      # URLs don't account for a reverse-proxy path prefix (confirmed:
      # tried /auth/ first, every redirect 404'd because Authentik reports
      # bare /application/o/... paths with no way to inject the prefix).
      # A dedicated subdomain sidesteps this: Authentik serves from its
      # own root exactly as it expects to. See
      # deploy/nginx/qa.aiqadam.org.conf for the matching nginx server
      # block.
      OIDC_ISSUER_URL: "https://auth.qa.aiqadam.org/application/o/aiqadam-qa/"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3113/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web-next:
    build:
      context: ..
      dockerfile: apps/web-next/Dockerfile
    image: aiqadam-qa-web-next:latest
    container_name: aiqadam-qa-web-next-1
    restart: unless-stopped
    network_mode: host
    environment:
      NODE_ENV: production
      HOST: "127.0.0.1"
      PORT: "4322"
      # Public origin, not a Docker-internal alias — host networking
      # means every service binds directly on the host's loopback, so
      # this is just another loopback port from web-next's perspective.
      # Mirrors infrastructure/web-next/docker-compose.yml's rationale.
      # NOTE: no /v1 suffix — apps/web-next/src/lib/api-ssr.ts appends
      # '/v1/...' itself; INTERNAL_API_URL is the bare origin.
      INTERNAL_API_URL: "https://qa.aiqadam.org"
      # Directus is now real (see the `directus` service above) — this
      # used to point at a deliberately-unreachable loopback port because
      # Directus was out of scope for QA (ai-qadam-infra T-0110's original
      # scope decision) and apps/web-next/src/lib/cms.ts's unresolvable
      # default hostname (http://directus:8055, a Docker service-name
      # alias that doesn't exist under network_mode: host) caused every
      # page load to hang ~10s before falling back. Now that a real
      # Directus is running on this host, point at it directly.
      INTERNAL_DIRECTUS_URL: "http://127.0.0.1:3119"

volumes:
  authentik-media:
    name: aiqadam-qa_authentik-media
  authentik-templates:
    name: aiqadam-qa_authentik-templates
