# deploy/nginx/aiqadam.org.conf — nginx vhost for pro-data-tech-prod.
#
# Replaces the host's existing /etc/nginx/sites-available/aiqadam.org,
# which proxied '/' straight to the api (127.0.0.1:3115) — the only app
# service that existed there. This version adds web-next (127.0.0.1:4322)
# as the default '/' target, and sends only the API's actual routes
# (/v1/*, /health) to the api. TLS cert paths, HTTP->HTTPS redirect, bare
# apex (no www), and the underlying api port are unchanged from the
# existing working vhost. Additive to this host — does not touch the
# pre-existing, unrelated penpot.aiqadam.org vhost.
#
# Deploying this file: copy/symlink into
# /etc/nginx/sites-available/aiqadam.org (replacing the current content)
# and reload nginx (`nginx -t && systemctl reload nginx`). This is a
# host-side step outside deploy.sh's current scope — see the runbook for
# how this gets applied.

server {
    listen 80;
    listen [::]:80;
    server_name aiqadam.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name aiqadam.org;

    ssl_certificate     /etc/letsencrypt/live/aiqadam.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiqadam.org/privkey.pem;

    # API routes — apps/api has no global prefix; individual controllers
    # declare their own /v1/... paths, and /health is unprefixed.
    location /health {
        proxy_pass http://127.0.0.1:3115;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:3115;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else — apps/web-next (the frontend).
    location / {
        proxy_pass http://127.0.0.1:4322;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
