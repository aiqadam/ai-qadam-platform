# deploy/nginx/qa.aiqadam.org.conf — nginx vhost for pro-data-tech-qa.
#
# Replaces deploy/nginx/qa-uz.aiqadam.org.conf. The `-uz` hostname was a
# workaround for a real bug in apps/api's tenant-routing middleware (any
# exactly-2-character leftmost hostname label, e.g. 'qa', was misparsed as
# a tenant code and 400'd) — fixed at the root in
# apps/api/src/modules/tenants/tenant.middleware.ts (added 'qa' to
# NON_TENANT_LABELS). Now that the underlying bug is fixed, this repo uses
# the originally-intended qa.aiqadam.org instead of the workaround hostname.
#
# Two server names now, not one: qa.aiqadam.org (the app, same routing as
# before) and auth.qa.aiqadam.org (Authentik, its own subdomain rather than
# a /auth/ path prefix — Authentik's self-reported discovery-document URLs
# don't account for a reverse-proxy path prefix, which caused every OIDC
# redirect to 404 when this was first tried as /auth/ under qa-uz. A
# dedicated subdomain sidesteps that entirely: Authentik serves from its
# own root, exactly as it expects to.)
#
# Deploying this file: copy/symlink into
# /etc/nginx/sites-available/qa.aiqadam.org (new) — do NOT reuse the old
# qa-uz.aiqadam.org site file's name, the domain has changed. Also add the
# same for the new auth.qa.aiqadam.org site. Then
# `nginx -t && systemctl reload nginx`. See the runbook for the full
# migration sequence, including disabling the old qa-uz.aiqadam.org site.

server {
    listen 80;
    listen [::]:80;
    server_name qa.aiqadam.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name qa.aiqadam.org;

    ssl_certificate     /etc/letsencrypt/live/qa.aiqadam.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qa.aiqadam.org/privkey.pem;

    # API routes — apps/api has no global prefix; individual controllers
    # declare their own /v1/... paths, and /health is unprefixed.
    location /health {
        proxy_pass http://127.0.0.1:3113;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:3113;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else — apps/web-next (the frontend), INCLUDING /api/*.
    # web-next has its own same-origin /api/[...path].ts proxy
    # (apps/web-next/src/pages/api/[...path].ts) purpose-built for hosts
    # like this one with no Traefik/Coolify path-prefix routing — it
    # forwards /api/<path> to INTERNAL_API_URL/<path> itself, preserving
    # cookies/headers/redirects correctly. Do NOT add a separate nginx
    # /api/ location routing straight to the api container — that would
    # bypass web-next's proxy and its Set-Cookie handling.
    location / {
        proxy_pass http://127.0.0.1:4322;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name auth.qa.aiqadam.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name auth.qa.aiqadam.org;

    ssl_certificate     /etc/letsencrypt/live/qa.aiqadam.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qa.aiqadam.org/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3117;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Authentik's flow UI uses WebSocket for live status updates.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
