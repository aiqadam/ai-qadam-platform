# deploy/docker-compose.prod.yml — pro-data-tech-prod (95.46.211.224, aiqadam.org).
#
# Source of truth for the prod compose stack. Previously this file existed
# only on the host (/opt/apps/aiqadam-prod/deploy/docker-compose.prod.yml,
# hand-authored during ai-qadam-infra tasks T-0111/T-0112); this repo now
# owns it — see docker-compose.qa.yml's header for the full rationale.
# postgres/oidc-stub/api's shape below (mounts, healthchecks, env,
# depends_on) is copied verbatim from that working original — only
# web-next is new.
#
# This host also runs a pre-existing, unrelated Penpot stack (own compose
# project, own containers) — do not touch it from here. See
# docs/04-development/infrastructure/runbooks/pro-data-tech-cicd.md.
#
# deploy.sh runs `docker compose -p aiqadam-prod -f
# deploy/docker-compose.prod.yml up -d --build` from $APP_DIR
# ($APP_DIR = /opt/apps/aiqadam-prod). Compose resolves relative paths
# against the directory containing this file (deploy/) — see
# docker-compose.qa.yml's header for how this was confirmed.
#
# Four services, all on host networking:
#   - postgres: dedicated aiqadam_prod database, NOT shared with QA.
#   - oidc-stub: static OIDC discovery stub (see docker-compose.qa.yml).
#   - api: apps/api, built from apps/api/Dockerfile. Was previously the
#     ONLY app service here (deliberate scope decision) — nginx proxied
#     '/' straight to it, which is why bare GET / 404'd. web-next below
#     fixes that.
#   - web-next: apps/web-next (the target frontend per ADR-0038).
#
# nginx (deploy/nginx/aiqadam.org.conf) routes '/' to web-next:4322 and
# '/health' + '/v1/*' to api:3115 — see that file for the split.

name: aiqadam-prod

services:
  postgres:
    image: postgres:16
    container_name: aiqadam-prod-postgres-1
    restart: unless-stopped
    environment:
      POSTGRES_DB: aiqadam_prod
      POSTGRES_USER: aiqadam_prod
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPORT: "3114"
    volumes:
      - aiqadam_prod_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:3114:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiqadam_prod -d aiqadam_prod"]
      interval: 5s
      timeout: 3s
      retries: 10
    network_mode: host

  oidc-stub:
    image: nginx:alpine
    container_name: aiqadam-prod-oidc-stub-1
    restart: unless-stopped
    volumes:
      - ./oidc-stub/openid-configuration.json:/usr/share/nginx/html/.well-known/openid-configuration:ro
      - ./oidc-stub/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9998/.well-known/openid-configuration"]
      interval: 5s
      timeout: 3s
      retries: 10
    network_mode: host

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    image: aiqadam-prod-api:latest
    container_name: aiqadam-prod-api-1
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      oidc-stub:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3115/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    network_mode: host

  web-next:
    build:
      context: ..
      dockerfile: apps/web-next/Dockerfile
    image: aiqadam-prod-web-next:latest
    container_name: aiqadam-prod-web-next-1
    restart: unless-stopped
    network_mode: host
    environment:
      NODE_ENV: production
      HOST: "127.0.0.1"
      PORT: "4322"
      # Public origin, not a Docker-internal alias. NOTE: no /v1 suffix
      # — see docker-compose.qa.yml's equivalent comment.
      INTERNAL_API_URL: "https://aiqadam.org"
      # See docker-compose.qa.yml's equivalent comment — cms.ts's
      # default (http://directus:8055) doesn't resolve under
      # network_mode: host and hangs ~10s per request before falling
      # back. Directus is out of scope for this environment by design.
      INTERNAL_DIRECTUS_URL: "http://127.0.0.1:1"

volumes:
  aiqadam_prod_pgdata:
    name: aiqadam-prod_aiqadam_prod_pgdata
