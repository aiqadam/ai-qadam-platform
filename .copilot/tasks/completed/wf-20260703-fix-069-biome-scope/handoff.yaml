  summary: |
    Closed per user direction (chat 2026-07-03): biome noise is policy,
    not a quality gate. GitHub is treated as an external drive; CI is
    already advisory. Two changes land in this PR:
      1. packages/biome-config/biome.json — disabled 30+ noisy recommended-set
         rules (style/contest, complexity, a11y, performance). Kept only
         high-signal rules (unused-*, noExplicitAny, useTemplate, useConst,
         noNonNullAssertion). Effect: pnpm lint 20,473 errors / 90s -> 1,658
         errors / 15s.
      2. .github/workflows/ci.yml — removed the Lint + format check (Biome)
         step entirely from the ci job. Developers run pnpm lint locally.
    The original issue framing (refactor sanitizeButtons and validateLeafOp)
    was based on a truncated log capture that mixed warnings with errors.
    With full data, those functions are warnings, not blockers — refactoring
    them would not change CI status. The storybook rolldown error remains a
    separate, pre-existing issue not addressed by this workflow.
