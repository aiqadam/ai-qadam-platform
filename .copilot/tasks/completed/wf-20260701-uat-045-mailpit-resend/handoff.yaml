notes: >-
  This follow-up was registered proactively by the Orchestrator running
  wf-20260701-fix-044, per AGENTS.md §6.1 ("any implementation that
  lands on main MUST be production-ready"). Without this workflow,
  ISS-LEAD-DISC-001's AC-5 carries an unverified deferral.

  Branch: fix/ISS-UAT-013-7-mailpit-resend-key from main b3dbba0.

  Strategy (Option A.2 from ISS-UAT-013-7): add a nodemailer SMTP transport
  to EmailService that routes to Mailpit when env.SMTP_HOST is set
  (independent of RESEND_API_KEY). Then BP-UAT-013 Steps 002/003 will work
  without setting RESEND_API_KEY at all — the UAT stack will use the local
  Mailpit SMTP listener (smtp://mailpit:1025).

  Expected verification at QualityGate: BP-UAT-013 Steps 002 + 003
  pass against apps/api with RESEND_API_KEY set (or whichever SMTP
  transport is chosen). Mailpit must capture the verify email; clicking
  the verify link must land on /leads/verified.

  Concrete verification commands (planned, not run yet):
    1. docker ps --filter "name=aiqadam-mailpit" --format "{{.Status}}"
       (must show healthy)
    2. curl -fsS http://localhost:8025/api/v1/messages (must respond)
    3. Set RESEND_API_KEY in apps/api/.env (or DSN to local Mailpit at
       smtp://mailpit:1025) and restart the api container
    4. Re-run apps/e2e/tests/uat/BP-UAT-013-signup.spec.ts Steps 002/003
       with playwright.uat.config.ts; expect both to PASS

  This follow-up may be merged independently of wf-20260701-fix-044.

  # Product decisions confirmed by Orchestrator (Option A path; user selected A 2026-07-01):
  #   1. mode derivation: SEND_EMAILS=false -> "disabled"; else NODE_ENV=production -> "production"; else "uat".
  #   2. NO global /v1 prefix in main.ts — routes resolve at the literal @Controller path.
  #   3. Pre-flight entry point: (a) new file scripts/uat-preflight-email.sh, wired into
  #      scripts/uat-env-setup.sh Step 5 (after the Mailpit wait_for_url).
  #   4. Endpoint path: GET /health/email (no /v1 prefix; main.ts has no setGlobalPrefix call).

product_decisions:
  mode_derivation: "SEND_EMAILS=false -> disabled; NODE_ENV=production -> production; else uat"
  endpoint_path: "/health/email"
  preflight_entry_point: "scripts/uat-preflight-email.sh (new file), called from scripts/uat-env-setup.sh Step 5"

