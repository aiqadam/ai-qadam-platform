requirement_ref: "FR-WORKFLOW-006"
requirement_text: >
  Fix five pieces of session friction discovered during the two prior
  workflows this session: (1) GitHub issues have no back-reference to
  their local ISS-<n> tracking file until close-out; (2) issue-resolution
  workflow has no documented scope-clarification procedure; (3) the
  documented direct-to-main archive-close-out commit is blocked by an
  active repository ruleset; (4) gh's cached default-repo can silently
  drift from the actual git remote; (5) Git Bash/MSYS mangles
  `git show <ref>:<path>`; (6) a gate agent can self-report `passed`
  while its own findings list contradicts that, with no protocol check
  to catch it.
github_issue_url: ""

