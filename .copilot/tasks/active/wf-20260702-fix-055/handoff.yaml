# ─── Source ──────────────────────────────────────────────────────────────────
requirement_ref: "ISS-UAT-SEED-001"
requirement_text: |
  uat-seed.sh step 4 fails on a fresh Directus: ensure_operator_invite POSTs
  consumed_at: null for pending invites, which Directus 11 rejects with
  VALUE_TOO_LONG for the readonly timestamp field. Additionally, the seed
  rows omit authentik_user_id, and env_get() in uat-seed.sh does not strip
  \r from Windows .env values, causing curl idempotency checks to return
  FORBIDDEN.
