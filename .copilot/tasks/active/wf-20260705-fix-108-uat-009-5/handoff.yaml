# ─── Source ──────────────────────────────────────────────────────────────────

requirement_ref: ISS-UAT-009-5
requirement_text: |
  BP-UAT-009 Neg 001 (`/workspace` redirect) is flaky because the test races
  the client-side `useEffect` redirect — `waitForURL` is wrapped in
  `.catch(() => {})` so the soft-assert fires before the navigation completes.
  Test-only fix shipped in wf-20260704-fix-080 (PR #102 squash 306a2aa). Per
  the issue Resolution section, ISS-UAT-009-5 flips to `resolved` ONLY after
  BOTH PRs land AND the 3× Neg 001 determinism check passes on the
  post-wf-20260704-fix-081 stack.
