requirement_ref: "FEAT-WORKFLOW-003"
requirement_text: |
  Make issue-status flip a first-class, atomic, autonomous part of the
  issue-resolution workflow. Currently Step 9 'Update Issue Registry' is
  underspecified: it does not say which status value to set, does not
  require both ISS-<n>.md and registry.md to change atomically, and has no
  post-merge verification. Result: wf-20260628-fix-033 'resolved' ISS-UAT-013-1
  in summary prose but left both files reading `open`, and the workflow
  'finished' without the issue actually being marked resolved anywhere
  authoritative.

  This feature hardens the protocol so that:
  1. Step 9 atomically sets status `resolved` in BOTH ISS-<n>.md and
     registry.md, on the feature branch, as part of the same PR as the fix.
  2. The default workflow behavior is fully autonomous: after QualityGate
     passes and CI is green, the Orchestrator auto-merges the PR via
     `gh pr merge --squash --auto`, then updates local main, then verifies
     the status flip landed.
  3. Human review is opt-in: if the user explicitly says they will review,
     the workflow pauses at PR-open and resumes when the user merges.
  4. QualityGate gains a new check: ISS file status == registry status,
     both must equal the expected terminal value, both must be present in
     the PR diff.

