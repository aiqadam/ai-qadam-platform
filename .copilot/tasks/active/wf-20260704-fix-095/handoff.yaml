  workspace vite 8.1.0. Re-run pnpm install; verify pnpm --filter web exec
  vitest run passes OnboardingForm.test.ts (5/5) AND utm.test.ts (45/45 no
  regression). Also unblocks ISS-UAT-013-13 AC-3.
