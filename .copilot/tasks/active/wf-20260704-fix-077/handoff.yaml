context:
  # The user-facing site served on :4321 is apps/web (legacy). apps/web-next
  # has the migrated `/me` but is NOT wired to :4321 today. Confirmed via
  # `Get-CimInstance Win32_Process -Filter "ProcessId = <node-pid-on-4321>"`:
  # `CommandLine = "...\apps\web\node_modules\astro\bin\astro.mjs dev --json"`.
  # Therefore the live `/me` AnonView is `apps/web/src/components/MeDashboard.tsx`,
  # NOT `apps/web-next/src/pages/me/index.astro`. Earlier notes in
  # workspace-state.md / ISS-UAT-009-2 resolution said the opposite, but
  # the live stack is the source of truth for this workflow.
  live_stack_source: "apps/web (legacy Astro on :4321)"
  apps_web_anon_view: "apps/web/src/components/MeDashboard.tsx::AnonView"
  apps_web_next_anon_view: "apps/web-next/src/blocks/common/AuthGate.astro (referenced by web-next/pages/me/index.astro)"
  root_cause_hypothesis: >
    apps/web/src/layouts/Layout.astro has Nav but NO <AppFooter />. The
    `apps/web-next` Layout (Layout.astro) DOES include <AppFooter /> — that
    is the layout-completeness pattern. Fix: bring apps/web Layout into
    parity with apps/web-next by adding the same AppFooter (or equivalent
    footer). Alternative considered: add a min-height spacer or extra
    empty-state content under AnonView — rejected because (a) it doesn't
    help non-`/me` pages with the same problem; (b) it's the layout's job
    to provide the footer, not each page's.