requirement_text: |
  Fix the BP-UAT-013 manifest lookup_field non-uniqueness bug. All 4 operator_invites
  fixtures share `lookup_field: token_prefix` + `lookup_value: uat-onbo`, so
  reset_domain_fixture's DELETE wipes each preceding CREATE. Only the LAST row
  survives. Fix the manifest (Option A: per-fixture `lookup_field: token_hash`
  with sha256 of token_plain) and add a bats regression row that asserts the
  "exactly 4 rows + each token_hash round-trips" invariants.
