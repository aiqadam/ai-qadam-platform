requirement_ref: "ISS-TEST-WEB-001-discovered-followups"
requirement_text: |
  Three pre-existing test-design bugs in apps/api that were masked by
  ISS-TEST-WEB-001's __vite_ssr_exportName__ block and are now visible
  with vitest 4.1.9:

    1. apps/api/test/users.spec.ts:65 — lastLoginAt > firstLogin
       assertion uses setTimeout(5) then toBeGreaterThan; flaky on
       system load. Tolerance: bump to setTimeout(20) or
       toBeGreaterThanOrEqual with jitter.
    2. apps/api/test/telegram-auth-controller.spec.ts:161 —
       Reflect.getMetadata('THROTTLER:THROTTLE') returns undefined on a
       hand-constructed AuthController instance. Either import the
       module-level controller or mock the Throttler module before
       construction.
    3. apps/api/test/port-guard.spec.ts cases 4, 8 — simulate Linux
       platform then expect 60s probe-timeout; on Windows the real
       findFreePort wins. Skip on process.platform === 'win32' with
       TODO, or raise testTimeout for those cases.

  Owned by wf-20260704-fix-095 per AGENTS.md §6.1 honesty disclosure.
