requirement_ref: "ISS-UAT-013-15"
requirement_text: |
  Make scripts/uat-seed.sh's curl binary MSYS-aware: when running under
  Git Bash / MSYS on Windows, use curl.exe (Windows native curl) instead
  of /usr/bin/curl (GNU ELF) — the latter cannot reach Windows-host
  localhost from this machine's Copilot-Chat terminal sandbox. The seed
  script should detect MSYS at startup and switch CURL_BIN accordingly.
